<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcription Platform</title>
  <style>
    body { font-family: sans-serif; max-width: 900px;
           margin: 40px auto; padding: 0 20px; }
    nav { display: flex; gap: 20px; margin-bottom: 30px;
          border-bottom: 1px solid #ccc; padding-bottom: 10px; }
    nav a { text-decoration: none; color: #333; }
    .btn { padding: 8px 16px; border: none; border-radius: 4px;
           cursor: pointer; font-size: 14px; }
    .btn-primary { background: #4285f4; color: white; }
    .btn-danger  { background: #ea4335; color: white; }
    .btn-warning { background: #fbbc04; color: black; }
    .error { color: red; margin: 10px 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
    th { background: #f5f5f5; }
  </style>
</head>
<body>
  {% if user %}
  <nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/my-jobs">My Jobs</a>
    {% if user.role == "admin" %}
    <a href="/admin/">Admin</a>
    {% endif %}
    <a href="/logout">Logout ({{ user.email }})</a>
  </nav>
  {% endif %}
  {% block content %}{% endblock %}
</body>
</html>
