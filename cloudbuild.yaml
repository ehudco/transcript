steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/transcript-web:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/transcript-web:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/transcript-web

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - transcript-web
      - --image=gcr.io/$PROJECT_ID/transcript-web:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=transcript-web@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=ENV=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID

images:
  - gcr.io/$PROJECT_ID/transcript-web
