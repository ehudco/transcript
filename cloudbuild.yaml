steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/transcript-web:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/transcript-web:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - transcript-web
      - --image=gcr.io/$PROJECT_ID/transcript-web:latest
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=transcript-web@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=ENV=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,BUILD_ID=$BUILD_ID,VM_INSTANCE_NAME=instance-20250702-125914,VM_ZONE=us-central1-c	

images:
  - gcr.io/$PROJECT_ID/transcript-web:latest
